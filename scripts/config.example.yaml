# Hyperliquid XYZ Market Maker Configuration
# Copy to config.yaml and edit before running
# Or run: python3 scripts/setup.py (interactive wizard)

market_maker:
  # Tokens to market make (must be XYZ builder-dex equity tokens)
  tokens:
    - BRENTOIL
    - CL
    - INTC

  # Spread: how far from mid price to place orders
  # 0.15% = each side 0.15% from mid (0.3% total spread)
  # Lower = more fills but less profit per fill
  # Higher = fewer fills but more profit per fill
  spread_pct: 0.15

  # Order size in USD notional per order
  order_size_usd: 200

  # Max inventory in units (shares) — bot stops quoting the
  # adding side when inventory approaches this limit
  max_inventory_units: 5

  # How often to refresh quotes (seconds)
  cycle_seconds: 5

  # Replace resting orders after this many seconds
  order_refresh_seconds: 30

  # Pause a token if price moves more than this % in 60 seconds
  pause_on_volatility_pct: 1.5

  # How long to pause a volatile token (minutes)
  pause_minutes: 10

  # Stop loss: close position if unrealized loss exceeds this %
  stop_loss_pct: 2.0

  # Stop ALL trading if daily loss exceeds this amount ($)
  # Circuit breaker — prevents catastrophic days
  max_daily_loss: 15.0

  # Pause a token for this many minutes after a stop loss hit
  # Prevents re-entering into a crashing market
  sl_cooldown_minutes: 30

  # Dry run mode (true = simulate without placing real orders)
  dry_run: false

  # Leverage (5x is typical for XYZ tokens)
  leverage: 5
